<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Expense — ExpenseTrack</title>
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/sidebar.css">
    <link rel="stylesheet" href="/css/form.css">

    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

    <!-- Sidebar -->
    <div id="sidebarContainer"></div>

    <!-- ===== PAGE WRAPPER ===== -->
    <div class="page-wrapper">

        <!-- ===== TOPBAR ===== -->
        <header class="topbar">
            <div class="topbar-left">
                <button class="topbar-btn" onclick="toggleSidebar()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="6" x2="21" y2="6" />
                        <line x1="3" y1="12" x2="21" y2="12" />
                        <line x1="3" y1="18" x2="21" y2="18" />
                    </svg>
                </button>

                <h1 class="topbar-title">Add Expense</h1>
            </div>
            <div class="topbar-right">
                <button class="topbar-btn" id="themeToggle" onclick="toggleTheme()"></button>
            </div>
        </header>

        <!-- ===== MAIN CONTENT ===== -->
        <main class="main-content">

            <div class="form-page-wrapper">
                <div class="form-card">

                    <div class="form-card-header">
                        <div class="form-card-icon expense-icon">📉</div>
                        <div>
                            <h2 class="form-card-title">Add Expense</h2>
                            <p class="form-card-sub">Record your expense details</p>
                        </div>
                    </div>

                    <!-- Amount -->
                    <div class="form-group">
                        <label>Amount <span class="required">*</span></label>
                        <div class="input-prefix">
                            <span class="prefix">₹</span>
                            <input type="text" id="amount" class="form-control prefix-input amount-input"
                                placeholder="0">
                        </div>
                    </div>

                    <!-- Date -->
                    <div class="form-group">
                        <label>Date <span class="required">*</span></label>
                        <input type="date" id="date" class="form-control">
                    </div>

                    <!-- Category + Account -->
                    <div class="form-row">
                        <div class="form-group">
                            <label>Category <span class="required">*</span></label>
                            <select id="category" class="form-control">
                                <option value="">Select Category</option>
                                <option>Food</option>
                                <option>Transport</option>
                                <option>Shopping</option>
                                <option>Bills</option>
                                <option>Rent</option>
                                <option>Health</option>
                                <option>Education</option>
                                <option>Entertainment</option>
                                <option>Groceries</option>
                                <option>Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Account <span class="required">*</span></label>
                            <select id="account" class="form-control">
                                <option value="">Select Account</option>
                                <option>Cash</option>
                                <option>Bank</option>
                                <option>UPI</option>
                                <option>Wallet</option>
                            </select>
                        </div>
                    </div>

                    <!-- Note -->
                    <div class="form-group">
                        <label>Note <span class="optional">(Optional)</span></label>
                        <input type="text" id="note" class="form-control" placeholder="Short note">
                    </div>

                    <!-- Description -->
                    <div class="form-group">
                        <label>Description <span class="optional">(Optional)</span></label>
                        <textarea id="description" class="form-control" placeholder="Additional details..."></textarea>
                    </div>

                    <!-- Attachment -->
                    <div class="form-group">
                        <label>Attachment <span class="optional">(Optional)</span></label>
                        <div class="file-upload" onclick="document.getElementById('file').click()">
                            <input type="file" id="file" style="display:none" onchange="showFileName()">
                            <p id="fileName">📎 Click to upload file</p>
                        </div>
                    </div>

                    <!-- Recurring -->
                    <div class="form-group">
                        <div class="checkbox-group">
                            <input type="checkbox" id="recurring">
                            <label for="recurring">Recurring Expense (remind next month)</label>
                        </div>
                    </div>

                    <!-- Submit -->
                    <button class="btn btn-primary btn-full" onclick="addExpense()" id="submitBtn">
                        Add Expense
                        <span class="loader" id="loader"></span>
                    </button>

                </div>
            </div>

        </main>
    </div>

    <!-- Mobile Bottom Nav -->
    <nav class="bottom-nav">
        <div class="bottom-nav-items">
            <a href="/pages/dashboard.html" class="bottom-nav-item">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7" />
                    <rect x="14" y="3" width="7" height="7" />
                    <rect x="14" y="14" width="7" height="7" />
                    <rect x="3" y="14" width="7" height="7" />
                </svg>
                Home
            </a>
            <a href="/pages/transactions.html" class="bottom-nav-item">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="8" y1="6" x2="21" y2="6" />
                    <line x1="8" y1="12" x2="21" y2="12" />
                    <line x1="8" y1="18" x2="21" y2="18" />
                    <line x1="3" y1="6" x2="3.01" y2="6" />
                    <line x1="3" y1="12" x2="3.01" y2="12" />
                    <line x1="3" y1="18" x2="3.01" y2="18" />
                </svg>
                Transactions
            </a>
            <a href="/pages/budget.html" class="bottom-nav-item">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10" />
                    <path d="M12 6v6l4 2" />
                </svg>
                Budget
            </a>
            <a href="/pages/reports.html" class="bottom-nav-item">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="20" x2="18" y2="10" />
                    <line x1="12" y1="20" x2="12" y2="4" />
                    <line x1="6" y1="20" x2="6" y2="14" />
                    <line x1="2" y1="20" x2="22" y2="20" />
                </svg>
                Reports
            </a>
            <a href="/pages/profile.html" class="bottom-nav-item">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                    <circle cx="12" cy="7" r="4" />
                </svg>
                Profile
            </a>
        </div>
    </nav>

    <div id="toast" class="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="/js/supabase.js"></script>
    <script src="/js/theme.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/sidebar.js"></script>
    <script src="/js/add-expense.js"></script>
    <script src="/js/amount-format.js"></script>
</body>

</html>
