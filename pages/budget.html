<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Budget — ExpenseTrack</title>
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/sidebar.css">
    <link rel="stylesheet" href="/css/budget.css">

    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

    <!-- Sidebar -->
    <div id="sidebarContainer"></div>

    <div class="page-wrapper">

        <!-- TOPBAR -->
        <header class="topbar">
            <div class="topbar-left">
                <button class="topbar-btn" onclick="toggleSidebar()">
                    <i data-lucide="menu"></i>
                </button>
                <h1 class="topbar-title">Budget</h1>
            </div>
            <div class="topbar-right">
                <button class="topbar-btn" id="themeToggle" onclick="toggleTheme()"></button>
            </div>
        </header>

        <main class="main-content">

            <!-- MONTH SELECTOR -->
            <div class="card budget-filter">
                <div class="budget-filter-row">
                    <div class="filter-group">
                        <label>Month</label>
                        <select id="budgetMonth" class="filter-select" onchange="loadBudget()">
                            <option>January</option>
                            <option>February</option>
                            <option>March</option>
                            <option>April</option>
                            <option>May</option>
                            <option>June</option>
                            <option>July</option>
                            <option>August</option>
                            <option>September</option>
                            <option>October</option>
                            <option>November</option>
                            <option>December</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Year</label>
                        <select id="budgetYear" class="filter-select" onchange="loadBudget()">
                        </select>
                    </div>
                </div>
            </div>

            <!-- ADD BUDGET -->
            <div class="card mb-md">
                <h3 class="section-title mb-md">Set Budget</h3>
                <div class="budget-form-row">
                    <div class="form-group">
                        <label>Category <span class="required">*</span></label>
                        <select id="budgetCategory" class="form-control">
                            <option value="">Select Category</option>
                            <option>Food</option>
                            <option>Transport</option>
                            <option>Shopping</option>
                            <option>Bills</option>
                            <option>Rent</option>
                            <option>Health</option>
                            <option>Education</option>
                            <option>Entertainment</option>
                            <option>Groceries</option>
                            <option>Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Limit Amount <span class="required">*</span></label>
                        <div class="input-prefix">
                            <span class="prefix">₹</span>
                            <input type="text" id="budgetAmount" class="form-control prefix-input amount-input"
                                placeholder="0.00" min="1">
                        </div>
                    </div>
                    <button class="btn btn-primary" onclick="addBudget()" id="budgetBtn">
                        <i data-lucide="plus"></i>
                        Add Budget
                        <span class="loader" id="budgetLoader"></span>
                    </button>
                </div>
            </div>

            <!-- BUDGET LIST -->
            <div id="budgetList">
                <div class="empty-state">
                    <p>No budgets set for this month</p>
                </div>
            </div>

        </main>
    </div>

    <!-- Mobile Bottom Nav -->
    <nav class="bottom-nav">
        <div class="bottom-nav-items">
            <a href="/pages/dashboard.html" class="bottom-nav-item">
                <i data-lucide="layout-dashboard"></i>
                Home
            </a>
            <a href="/pages/transactions.html" class="bottom-nav-item">
                <i data-lucide="list"></i>
                Transactions
            </a>
            <!-- Budget page pe active class -->
            <a href="/pages/budget.html" class="bottom-nav-item active">
                <i data-lucide="target"></i>
                Budget
            </a>
            <a href="/pages/reports.html" class="bottom-nav-item">
                <i data-lucide="bar-chart-2"></i>
                Reports
            </a>
            <a href="/pages/profile.html" class="bottom-nav-item">
                <i data-lucide="user"></i>
                Profile
            </a>
        </div>
    </nav>

    <div id="toast" class="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="/js/supabase.js"></script>
    <script src="/js/theme.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/sidebar.js"></script>
    <script src="/js/budget.js"></script>
    <script src="/js/amount-format.js"></script>
    <script>lucide.createIcons();</script>
</body>

</html>
