<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Notifications — ExpenseTrack</title>
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/sidebar.css">
    <link rel="stylesheet" href="/css/notifications.css">

    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

    <!-- Sidebar -->
    <div id="sidebarContainer"></div>

    <div class="page-wrapper">

        <!-- TOPBAR -->
        <header class="topbar">
            <div class="topbar-left">
                <button class="topbar-btn" onclick="toggleSidebar()">
                    <i data-lucide="menu"></i>
                </button>
                <h1 class="topbar-title">Notifications</h1>
            </div>
            <div class="topbar-right">
                <button class="btn btn-secondary btn-sm" onclick="markAllRead()">
                    Mark all read
                </button>
                <button class="topbar-btn" id="themeToggle" onclick="toggleTheme()"></button>
            </div>
        </header>

        <main class="main-content">

            <!-- NOTIFICATIONS LIST -->
            <div id="notificationsList">
                <div class="empty-state">
                    <p>Loading...</p>
                </div>
            </div>

        </main>
    </div>

    <!-- Mobile Bottom Nav -->
    <nav class="bottom-nav">
        <div class="bottom-nav-items">
            <a href="/pages/dashboard.html" class="bottom-nav-item">
                <i data-lucide="layout-dashboard"></i>
                Home
            </a>
            <a href="/pages/transactions.html" class="bottom-nav-item">
                <i data-lucide="list"></i>
                Transactions
            </a>
            <!-- NAYA -->
            <a href="/pages/budget.html" class="bottom-nav-item">
                <i data-lucide="target"></i>
                Budget
            </a>
            <a href="/pages/reports.html" class="bottom-nav-item">
                <i data-lucide="bar-chart-2"></i>
                Reports
            </a>
            <a href="/pages/profile.html" class="bottom-nav-item">
                <i data-lucide="user"></i>
                Profile
            </a>
        </div>
    </nav>

    <div id="toast" class="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="/js/supabase.js"></script>
    <script src="/js/theme.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/sidebar.js"></script>
    <script src="/js/notifications.js"></script>
    <script>lucide.createIcons();</script>
</body>

</html>
