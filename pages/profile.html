<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profile — ExpenseTrack</title>
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/sidebar.css">
    <link rel="stylesheet" href="/css/profile.css">

    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

    <!-- Sidebar -->
    <div id="sidebarContainer"></div>

    <div class="page-wrapper">

        <!-- TOPBAR -->
        <header class="topbar">
            <div class="topbar-left">
                <button class="topbar-btn" onclick="toggleSidebar()">
                    <i data-lucide="menu"></i>
                </button>
                <h1 class="topbar-title">Profile</h1>
            </div>
            <div class="topbar-right">
                <button class="topbar-btn" id="themeToggle" onclick="toggleTheme()"></button>
            </div>
        </header>

        <main class="main-content">

            <!-- PROFILE CARD -->
            <div class="profile-card">

                <!-- Avatar -->
                <div class="profile-avatar-section">
                    <div class="profile-avatar" id="profileAvatar">U</div>
                    <div class="profile-avatar-info">
                        <h2 id="profileName">Loading...</h2>
                        <p id="profileEmail">loading@email.com</p>
                        <span class="profile-badge">
                            <i data-lucide="shield-check"></i>
                            Verified Account
                        </span>
                    </div>
                </div>

                <div class="divider"></div>

                <!-- STATS -->
                <div class="profile-stats">
                    <div class="profile-stat">
                        <span class="profile-stat-value text-green" id="profileIncome">₹ 0</span>
                        <span class="profile-stat-label">Total Income</span>
                    </div>
                    <div class="profile-stat">
                        <span class="profile-stat-value text-red" id="profileExpense">₹ 0</span>
                        <span class="profile-stat-label">Total Expense</span>
                    </div>
                    <div class="profile-stat">
                        <span class="profile-stat-value" id="profileBalance">₹ 0</span>
                        <span class="profile-stat-label">Net Balance</span>
                    </div>
                </div>

                <div class="divider"></div>

                <!-- UPDATE NAME -->
                <div class="profile-section">
                    <h3 class="profile-section-title">
                        <i data-lucide="user"></i>
                        Update Name
                    </h3>
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="newName" class="form-control" placeholder="Enter new name">
                    </div>
                    <button class="btn btn-primary" onclick="updateName()" id="nameBtn">
                        Update Name
                        <span class="loader" id="nameLoader"></span>
                    </button>
                </div>

                <div class="divider"></div>

                <!-- CHANGE PASSWORD -->
                <div class="profile-section">
                    <h3 class="profile-section-title">
                        <i data-lucide="lock"></i>
                        Change Password
                    </h3>
                    <div class="form-group">
                        <label>New Password</label>
                        <div class="input-password">
                            <input type="password" id="newPassword" class="form-control" placeholder="Min 6 characters">
                            <button class="password-toggle" onclick="togglePassword()">
                                <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                    <circle cx="12" cy="12" r="3" />
                                </svg>
                            </button>
                        </div>
                    </div>
                    <button class="btn btn-primary" onclick="updatePassword()" id="passBtn">
                        Update Password
                        <span class="loader" id="passLoader"></span>
                    </button>
                </div>

                <div class="divider"></div>

                <!-- LOGOUT -->
                <div class="profile-section">
                    <h3 class="profile-section-title">
                        <i data-lucide="log-out"></i>
                        Account
                    </h3>
                    <button class="btn btn-danger" onclick="logout()">
                        <i data-lucide="log-out"></i>
                        Logout
                    </button>
                </div>

            </div>

        </main>
    </div>

    <!-- Mobile Bottom Nav -->
    <nav class="bottom-nav">
        <div class="bottom-nav-items">
            <a href="/pages/dashboard.html" class="bottom-nav-item">
                <i data-lucide="layout-dashboard"></i>
                Home
            </a>
            <a href="/pages/transactions.html" class="bottom-nav-item">
                <i data-lucide="list"></i>
                Transactions
            </a>
            <!-- NAYA -->
            <a href="/pages/budget.html" class="bottom-nav-item">
                <i data-lucide="target"></i>
                Budget
            </a>
            <a href="/pages/reports.html" class="bottom-nav-item">
                <i data-lucide="bar-chart-2"></i>
                Reports
            </a>
            <a href="/pages/profile.html" class="bottom-nav-item active">
                <i data-lucide="user"></i>
                Profile
            </a>
        </div>
    </nav>

    <div id="toast" class="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="/js/supabase.js"></script>
    <script src="/js/theme.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/sidebar.js"></script>
    <script src="/js/profile.js"></script>
    <script>lucide.createIcons();</script>
</body>

</html>
