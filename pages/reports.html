<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reports — ExpenseTrack</title>
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/sidebar.css">
    <link rel="stylesheet" href="/css/reports.css">

    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

    <!-- Sidebar -->
    <div id="sidebarContainer"></div>

    <div class="page-wrapper">

        <!-- TOPBAR -->
        <header class="topbar">
            <div class="topbar-left">
                <button class="topbar-btn" onclick="toggleSidebar()">
                    <i data-lucide="menu"></i>
                </button>
                <h1 class="topbar-title">Reports</h1>
            </div>
            <div class="topbar-right">
                <button class="topbar-btn" onclick="printReport()">
                    <i data-lucide="printer"></i>
                </button>
                <button class="topbar-btn" id="themeToggle" onclick="toggleTheme()"></button>
            </div>
        </header>

        <main class="main-content">

            <!-- MONTH YEAR SELECTOR -->
            <div class="card report-filters">
                <div class="report-filters-row">
                    <div class="filter-group">
                        <label>Month</label>
                        <select id="reportMonth" class="filter-select" onchange="loadReport()">
                            <option value="January">January</option>
                            <option value="February">February</option>
                            <option value="March">March</option>
                            <option value="April">April</option>
                            <option value="May">May</option>
                            <option value="June">June</option>
                            <option value="July">July</option>
                            <option value="August">August</option>
                            <option value="September">September</option>
                            <option value="October">October</option>
                            <option value="November">November</option>
                            <option value="December">December</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Year</label>
                        <select id="reportYear" class="filter-select" onchange="loadReport()">
                        </select>
                    </div>
                    <button class="btn btn-primary btn-sm" onclick="loadReport()">
                        <i data-lucide="search"></i>
                        Generate
                    </button>
                </div>
            </div>

            <!-- STATEMENT HEADER -->
            <div class="statement-card" id="statementArea">

                <div class="statement-header">
                    <div class="statement-brand">
                        <i data-lucide="wallet"></i>
                        <span>ExpenseTrack</span>
                    </div>
                    <div class="statement-title-block">
                        <h2>Transaction Statement</h2>
                        <p id="statementPeriod">— Select month to generate —</p>
                    </div>
                    <div class="statement-meta">
                        <p>Generated: <span id="generatedDate"></span></p>
                    </div>
                </div>

                <div class="statement-divider"></div>

                <!-- SUMMARY -->
                <div class="statement-summary">
                    <div class="stmt-sum-item">
                        <span class="stmt-sum-label">Opening Balance</span>
                        <span class="stmt-sum-value" id="openingBalance">₹ 0</span>
                    </div>
                    <div class="stmt-sum-item">
                        <span class="stmt-sum-label">Total Credit</span>
                        <span class="stmt-sum-value text-green" id="totalCredit">₹ 0</span>
                    </div>
                    <div class="stmt-sum-item">
                        <span class="stmt-sum-label">Total Debit</span>
                        <span class="stmt-sum-value text-red" id="totalDebit">₹ 0</span>
                    </div>
                    <div class="stmt-sum-item">
                        <span class="stmt-sum-label">Closing Balance</span>
                        <span class="stmt-sum-value" id="closingBalance">₹ 0</span>
                    </div>
                </div>

                <div class="statement-divider"></div>

                <!-- TRANSACTIONS TABLE -->
                <div class="statement-table-wrapper">
                    <table class="statement-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Description</th>
                                <th>Category</th>
                                <th>Type</th>
                                <th>Debit</th>
                                <th>Credit</th>
                                <th>Balance</th>
                            </tr>
                        </thead>
                        <tbody id="statementRows">
                            <tr>
                                <td colspan="7">
                                    <div class="empty-state">
                                        <p>Select month and year to generate statement</p>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

            </div>

        </main>
    </div>

    <!-- Mobile Bottom Nav -->
    <nav class="bottom-nav">
        <div class="bottom-nav-items">
            <a href="/pages/dashboard.html" class="bottom-nav-item">
                <i data-lucide="layout-dashboard"></i>
                Home
            </a>
            <a href="/pages/transactions.html" class="bottom-nav-item">
                <i data-lucide="list"></i>
                Transactions
            </a>
            <!-- NAYA -->
            <a href="/pages/budget.html" class="bottom-nav-item">
                <i data-lucide="target"></i>
                Budget
            </a>
            <a href="/pages/reports.html" class="bottom-nav-item active">
                <i data-lucide="bar-chart-2"></i>
                Reports
            </a>
            <a href="/pages/profile.html" class="bottom-nav-item">
                <i data-lucide="user"></i>
                Profile
            </a>
        </div>
    </nav>

    <div id="toast" class="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="/js/supabase.js"></script>
    <script src="/js/theme.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/sidebar.js"></script>
    <script src="/js/reports.js"></script>
    <script>lucide.createIcons();</script>
</body>

</html>
