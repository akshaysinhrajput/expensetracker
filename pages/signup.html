<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — ExpenseTrack</title>
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/auth.css">

    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

    <!-- ===== AUTH WRAPPER ===== -->
    <div class="auth-wrapper">

        <!-- Left Panel -->
        <div class="auth-left">
            <div class="auth-brand" onclick="location.href='/index.html'">
                <div class="nav-logo">
                    <i data-lucide="wallet" style="width:20px;height:20px;color:white;"></i>
                </div>
                <span>Expense<span class="text-green">Track</span></span>
            </div>
            <div class="auth-left-content">
                <h2>Start your financial journey today.</h2>
                <p>Create your free account and take control of your money with smart tracking and insights.</p>
                <div class="auth-features">
                    <div class="auth-feature">✅ Free to use forever</div>
                    <div class="auth-feature">✅ Bank style reports</div>
                    <div class="auth-feature">✅ Smart notifications</div>
                    <div class="auth-feature">✅ Dark & Light mode</div>
                </div>
            </div>
        </div>

        <!-- Right Panel -->
        <div class="auth-right">
            <div class="auth-card">

                <h2 class="auth-title">Create Account</h2>
                <p class="auth-subtitle">Sign up for free in seconds</p>

                <!-- Form -->
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="fullName" class="form-control" placeholder="Enter your full name">
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" class="form-control" placeholder="Enter your email">
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-password">
                        <input type="password" id="password" class="form-control" placeholder="Min 6 characters">
                        <button class="password-toggle" onclick="togglePassword('password', 'eyeIcon1')">
                            <svg id="eyeIcon1" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <div class="input-password">
                        <input type="password" id="confirmPassword" class="form-control"
                            placeholder="Re-enter password">
                        <button class="password-toggle" onclick="togglePassword('confirmPassword', 'eyeIcon2')">
                            <svg id="eyeIcon2" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                        </button>
                    </div>
                </div>

                <button class="btn btn-primary btn-full" onclick="signup()" id="signupBtn">
                    Create Account
                    <span class="loader" id="loader"></span>
                </button>

                <div class="auth-divider">
                    <span>Already have an account?</span>
                </div>

                <button class="btn btn-secondary btn-full" onclick="location.href='/pages/login.html'">
                    Login
                </button>

            </div>
        </div>

    </div>

    <div id="toast" class="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="/js/supabase.js"></script>
    <script src="/js/theme.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/signup.js"></script>

    <script>lucide.createIcons();</script>

</body>

</html>
